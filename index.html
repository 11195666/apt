<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, user-scalable=0">
    <title>Junhong Repo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .desc { color: #86868b; font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
        .btn {
            display: block;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .btn-sileo {
            background: #27BEF5;
            color: #fff;
        }
        .btn-sileo:hover { opacity: 0.85; }
        .btn-cydia {
            background: #f2f2f7;
            color: #1d1d1f;
        }
        .btn-cydia:hover { background: #e5e5ea; }
        .btn-zebra {
            background: #f2f2f7;
            color: #1d1d1f;
        }
        .btn-zebra:hover { background: #e5e5ea; }
        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: #aeaeb2;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #000; color: #f5f5f7; }
            .card { background: #1c1c1e; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
            .btn-cydia, .btn-zebra { background: #2c2c2e; color: #f5f5f7; }
            .btn-cydia:hover, .btn-zebra:hover { background: #3a3a3c; }
            .desc { color: #98989d; }
            .footer-text { color: #636366; }
        }
    </style>
    <meta name="theme-color" content="#27BEF5">
</head>
<body>
    <div class="card">
        <img class="avatar" src="https://mjh.im/touxiang.jpg" alt="Junhong">
        <h1>Junhong Repo</h1>
        <p class="desc">欢迎光临</p>
        <a class="btn btn-sileo" href="sileo://source/https://apt.mjh.im">在 Sileo 中添加源</a>
        <a class="btn btn-cydia" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://apt.mjh.im">在 Cydia 中添加源</a>
        <a class="btn btn-zebra" href="zbra://sources/add/https://apt.mjh.im">在 Zebra 中添加源</a>
        <p class="footer-text">Junhong Repo · Updated 2026-06-07</p>
    </div>
</body>
</html>
